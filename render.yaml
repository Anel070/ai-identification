services:
  - type: web
    name: ai-video-detector
    env: node
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: GEMINI_API_KEY
        sync: false          # Укажите вручную в Dashboard
      - key: JWT_SECRET
        generateValue: true  # Render сгенерирует автоматически
      - key: DATABASE_URL
        fromDatabase:
          name: ai-video-db
          property: connectionString

databases:
  - name: ai-video-db
    plan: free
    databaseName: ai_video_detector
